name: 功能建议
description: 提出新功能或改进想法
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景与问题
      description: 你遇到了什么痛点？现有能力为何不够？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 你希望如何改进（可含界面/接口/配置层面的想法）。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 可选。
  - type: checkboxes
    id: contribute
    attributes:
      label: 参与意愿
      options:
        - label: 我愿意提交 PR 参与实现（若方向一致）
          required: false
